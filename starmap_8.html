<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Star Map</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; background:#080c14; overflow:hidden; font-family:-apple-system,sans-serif; color:#e8eaf0; }
canvas { position:fixed; top:0; left:0; cursor:default; }

#header { position:fixed; top:2rem; left:50%; transform:translateX(-50%); text-align:center; pointer-events:none; }
#header h1 { font-size:12px; font-weight:400; letter-spacing:0.18em; color:rgba(180,190,220,0.45); text-transform:uppercase; margin-bottom:4px; }
#header p { font-size:11px; color:rgba(140,155,190,0.3); letter-spacing:0.06em; }

#counter { position:fixed; top:2rem; right:2rem; text-align:right; pointer-events:none; }
#counter span { font-size:26px; font-weight:300; color:rgba(180,200,255,0.55); display:block; }
#counter small { font-size:10px; color:rgba(140,160,200,0.3); letter-spacing:0.1em; text-transform:uppercase; }

#bottom { position:fixed; bottom:4rem; left:50%; transform:translateX(-50%); text-align:center; }
#lbl { font-size:11px; color:rgba(180,200,255,0.4); letter-spacing:0.1em; margin-bottom:10px; }
#cat-row { display:flex; gap:6px; justify-content:center; margin-bottom:10px; }
.cat-btn { border-radius:16px; border:1.5px solid transparent; font-size:11px; padding:5px 12px; cursor:pointer; letter-spacing:0.04em; opacity:0.45; background:transparent; color:#e8eaf0; transition:opacity 0.2s; }
.cat-btn.active { opacity:1; }
#row { display:flex; gap:8px; align-items:center; }
#task { background:rgba(255,255,255,0.08); border:0.5px solid rgba(255,255,255,0.2); border-radius:20px; color:rgba(255,255,255,0.95); font-size:13px; padding:9px 18px; width:200px; outline:none; }
#task::placeholder { color:rgba(200,210,235,0.4); }
#task.error { border-color:rgba(255,120,120,0.6); }
#btn { background:rgba(100,130,220,0.18); border:0.5px solid rgba(120,150,240,0.35); border-radius:20px; color:rgba(200,215,255,0.9); font-size:12px; padding:9px 20px; cursor:pointer; letter-spacing:0.04em; }
#btn:hover { background:rgba(100,130,220,0.32); }

#controls { position:fixed; top:2rem; left:2rem; display:flex; flex-direction:column; gap:8px; }
.ctrl-btn { background:rgba(255,255,255,0.03); border:0.5px solid rgba(255,255,255,0.1); border-radius:8px; color:rgba(180,190,220,0.4); font-size:11px; padding:6px 12px; cursor:pointer; letter-spacing:0.05em; text-align:left; }
.ctrl-btn:hover { background:rgba(255,255,255,0.07); color:rgba(200,215,245,0.7); }
.ctrl-btn.active { background:rgba(100,130,220,0.15); border-color:rgba(120,150,240,0.3); color:rgba(180,200,255,0.8); }

#toast { position:fixed; top:42%; left:50%; transform:translateX(-50%); background:rgba(60,90,180,0.1); border:0.5px solid rgba(120,160,255,0.18); border-radius:12px; padding:10px 22px; font-size:13px; color:rgba(180,210,255,0.75); opacity:0; transition:opacity 0.4s; pointer-events:none; white-space:nowrap; }
#milestone { position:fixed; top:35%; left:50%; transform:translateX(-50%); font-size:17px; font-weight:300; color:rgba(220,235,255,0.9); opacity:0; transition:opacity 0.5s; pointer-events:none; white-space:nowrap; text-align:center; letter-spacing:0.06em; }

#tooltip { position:fixed; pointer-events:none; background:rgba(10,15,30,0.88); border:0.5px solid rgba(160,180,255,0.22); border-radius:8px; padding:6px 12px; font-size:12px; color:rgba(200,220,255,0.9); opacity:0; transition:opacity 0.15s; white-space:nowrap; letter-spacing:0.03em; }
#ctx-menu { position:fixed; background:rgba(12,18,35,0.95); border:0.5px solid rgba(160,180,255,0.2); border-radius:8px; padding:4px 0; font-size:12px; opacity:0; pointer-events:none; transition:opacity 0.15s; z-index:100; }
#ctx-menu.show { opacity:1; pointer-events:all; }
#ctx-menu div { padding:7px 16px; color:rgba(220,140,140,0.85); cursor:pointer; letter-spacing:0.03em; }
#ctx-menu div:hover { background:rgba(255,100,100,0.1); }

#legend { position:fixed; bottom:1.5rem; left:1.5rem; pointer-events:none; background:rgba(10,15,30,0.7); border:0.5px solid rgba(160,180,255,0.12); border-radius:10px; padding:12px 16px; }
#legend h3 { font-size:11px; font-weight:500; color:rgba(180,200,255,0.5); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px; }
#legend ul { list-style:none; }
#legend ul li { font-size:12px; color:rgba(180,195,225,0.55); line-height:2; display:flex; gap:8px; align-items:baseline; }
#legend ul li .key { font-size:11px; color:rgba(160,180,255,0.75); background:rgba(100,130,220,0.12); border:0.5px solid rgba(120,150,240,0.25); border-radius:4px; padding:1px 6px; white-space:nowrap; }
#dl { position:fixed; bottom:1.4rem; right:1.5rem; background:rgba(255,255,255,0.03); border:0.5px solid rgba(255,255,255,0.09); border-radius:8px; color:rgba(180,190,220,0.38); font-size:11px; padding:6px 14px; cursor:pointer; }
#dl:hover { color:rgba(200,215,245,0.65); }

#undo-btn { position:fixed; bottom:1.4rem; right:8rem; background:rgba(255,255,255,0.03); border:0.5px solid rgba(255,255,255,0.09); border-radius:8px; color:rgba(180,190,220,0.38); font-size:11px; padding:6px 14px; cursor:pointer; }
#undo-btn:hover { color:rgba(220,160,160,0.7); }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="header"><h1>Focus Star Map</h1><p>每一個完成，都是一顆星</p></div>
<div id="counter"><span id="cnt">0</span><small>任務完成</small></div>

<div id="controls">
  <button class="ctrl-btn" id="replay-btn">▶ 回放今天的路</button>
</div>

<div id="bottom">
  <div id="lbl">你今天完成了什麼？</div>
  <div id="cat-row">
    <button class="cat-btn active" data-cat="0" style="border-color:rgba(160,184,255,0.65);color:#a0b8ff">學習</button>
    <button class="cat-btn" data-cat="1" style="border-color:rgba(96,210,165,0.3);color:#60d2a5">創作</button>
    <button class="cat-btn" data-cat="2" style="border-color:rgba(255,186,100,0.3);color:#ffba64">生活</button>
    <button class="cat-btn" data-cat="3" style="border-color:rgba(220,130,200,0.3);color:#dc82c8">社交</button>
  </div>
  <div id="row">
    <input id="task" type="text" placeholder="輸入任務名稱..." maxlength="20">
    <button id="btn">完成 ✦</button>
  </div>
</div>

<div id="toast"></div>
<div id="milestone"></div>
<div id="tooltip"></div>
<div id="ctx-menu"><div id="ctx-delete">刪除這顆星</div></div>
<div id="legend"><h3>使用說明</h3><ul><li><span class="key">選類別</span> 選擇任務分類</li><li><span class="key">輸入</span> 打上完成的事情</li><li><span class="key">完成 ✦</span> 點亮你的星星</li><li><span class="key">Hover</span> 查看星星名稱</li><li><span class="key">右鍵</span> 刪除星星</li><li><span class="key">Z</span> 撤銷上一顆</li><li><span class="key">▶ 回放</span> 重走今天的路</li></ul></div>
<button id="undo-btn">↩ 撤銷</button>
<button id="dl">下載星圖</button>

<script>
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
let W=0,H=0,mouseX=-999,mouseY=-999;

const bgStars=[],otherStars=[],userStars=[],parts=[];
let taskCount=0,selectedCat=0;
let replayMode=false,replayIndex=0,replayTimer=0;
let ctxTarget=null;

// Category gravity centers (normalized 0-1)
const CAT_CENTERS=[
  {nx:0.28,ny:0.32}, // 學習 top-left
  {nx:0.72,ny:0.28}, // 創作 top-right
  {nx:0.25,ny:0.68}, // 生活 bottom-left
  {nx:0.72,ny:0.68}, // 社交 bottom-right
];

const CATS=[
  {name:'學習',col:'#a0b8ff',rgb:[160,184,255]},
  {name:'創作',col:'#60d2a5',rgb:[96,210,165]},
  {name:'生活',col:'#ffba64',rgb:[255,186,100]},
  {name:'社交',col:'#dc82c8',rgb:[220,130,200]},
];
const TOASTS=['你點亮了一顆星','有人也在走','這一步，記住了','繼續走，星圖在長大','你不是一個人在撐'];
const SEED_LABELS=['完成論文大綱','讀完第三章','寄出企劃書','練習簡報','整理資料夾','寫週報','完成作業','讀文獻','設計稿定案'];
const NEUTRAL_COLS=['#e8e0c8','#c8d8e0','#d0c8e8','#c8e0d0','#e0d0c8'];

function r(a,b){return a+Math.random()*(b-a);}

// ── init ─────────────────────────────────────────────────
function init(){
  W=cv.width=window.innerWidth;
  H=cv.height=window.innerHeight;
  bgStars.length=0;
  for(let i=0;i<200;i++){
    bgStars.push({x:r(0,W),y:r(0,H),rad:r(0.4,1.6),base:r(0.07,0.27),spd:r(0.003,0.01),off:r(0,Math.PI*2),col:Math.random()<0.12?'#b8c8ff':Math.random()<0.08?'#ffd8aa':'#fff'});
  }
  if(otherStars.length===0){
    SEED_LABELS.forEach((label,i)=>{
      const cat=Math.floor(Math.random()*4);
      const cx2=CAT_CENTERS[cat];
      const bx=cx2.nx*W, by=cx2.ny*H;
      otherStars.push({
        x:bx+r(-W*0.12,W*0.12), y:by+r(-H*0.1,H*0.1),
        tx:bx+r(-W*0.12,W*0.12), ty:by+r(-H*0.1,H*0.1),
        rad:r(2,3.5),alpha:r(0.55,0.8),ph:r(0,Math.PI*2),pspd:r(0.015,0.03),
        label,col:CATS[cat].col,cat,incoming:false,traveling:false,
        pulse:0,pulseTimer:0
      });
    });
  }
}

// ── gravity drift for user stars ──────────────────────────
function applyGravity(s){
  if(s.cat<0||s.cat>3) return;
  const tc=CAT_CENTERS[s.cat];
  const tx=tc.nx*W, ty=tc.ny*H;
  s.x+=(tx-s.x)*0.0004;
  s.y+=(ty-s.y)*0.0004;
}

// ── incoming other star ───────────────────────────────────
function spawnIncoming(){
  const col=NEUTRAL_COLS[Math.floor(Math.random()*NEUTRAL_COLS.length)];
  const edge=Math.floor(Math.random()*4);
  let x,y;
  if(edge===0){x=r(0,W);y=-10;}
  else if(edge===1){x=W+10;y=r(0,H);}
  else if(edge===2){x=r(0,W);y=H+10;}
  else{x=-10;y=r(0,H);}
  const tx=r(W*0.05,W*0.95),ty=r(H*0.05,H*0.85);
  // random future pulse
  const pulseStar=otherStars[Math.floor(Math.random()*otherStars.length)];
  if(pulseStar) pulseStar.pulseTimer=1;
  otherStars.push({x,y,tx,ty,rad:0,targetRad:r(1.8,3),alpha:0,ph:r(0,Math.PI*2),pspd:r(0.01,0.025),col,cat:-1,label:'',incoming:true,traveling:true,pulse:0,pulseTimer:0});
}
function scheduleNext(){setTimeout(()=>{spawnIncoming();scheduleNext();},r(4000,5000));}
scheduleNext();

// ── random existing star pulse ────────────────────────────
function randomPulse(){
  if(otherStars.length>0){
    const s=otherStars[Math.floor(Math.random()*otherStars.length)];
    s.pulseTimer=1;
  }
  setTimeout(randomPulse,r(3000,7000));
}
setTimeout(randomPulse,2000);

// ── category buttons ──────────────────────────────────────
document.querySelectorAll('.cat-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    selectedCat=+btn.dataset.cat;
    document.querySelectorAll('.cat-btn').forEach(b=>{
      const ci=+b.dataset.cat;
      b.classList.toggle('active',ci===selectedCat);
      b.style.borderColor=ci===selectedCat?`rgba(${CATS[ci].rgb.join(',')},0.7)`:`rgba(${CATS[ci].rgb.join(',')},0.25)`;
      b.style.opacity=ci===selectedCat?'1':'0.45';
    });
  });
});

// ── complete ──────────────────────────────────────────────
function complete(){
  const inp=document.getElementById('task');
  const label=inp.value.trim();
  if(!label){
    inp.classList.add('error');inp.placeholder='請先輸入名稱！';
    setTimeout(()=>{inp.classList.remove('error');inp.placeholder='輸入任務名稱...';},1400);
    inp.focus();return;
  }
  inp.value='';
  const cat=selectedCat,col=CATS[cat].col;
  const sameCount=userStars.filter(s=>s.cat===cat).length;
  const m10=(sameCount+1)%10===0,m5=(sameCount+1)%5===0;
  const targetRad=m10?r(14,18):m5?r(9,12):r(4,7);

  // place near category center with spread
  const cc=CAT_CENTERS[cat];
  const bx=cc.nx*W, by=cc.ny*H;
  const sx=Math.max(W*0.06,Math.min(W*0.94, bx+r(-W*0.15,W*0.15)));
  const sy=Math.max(H*0.08,Math.min(H*0.78, by+r(-H*0.15,H*0.15)));

  userStars.push({x:sx,y:sy,rad:0,targetRad,alpha:0,ph:0,pspd:r(0.02,0.04),label,col,cat,big:m5||m10,deleted:false});
  burst(sx,sy,col);
  taskCount++;
  document.getElementById('cnt').textContent=taskCount;
  showToast(TOASTS[(taskCount-1)%TOASTS.length]);
  if(m10) showMilestone(`✦✦✦ ${CATS[cat].name} 達成 ${sameCount+1} 件 ✦✦✦`);
  else if(m5) showMilestone(`✦ ${CATS[cat].name} 達成 ${sameCount+1} 件`);
}

// ── undo / delete ─────────────────────────────────────────
function undoLast(){
  if(userStars.length===0)return;
  userStars.pop();
  taskCount=Math.max(0,taskCount-1);
  document.getElementById('cnt').textContent=taskCount;
  showToast('已撤銷');
}

function deleteStar(s){
  const idx=userStars.indexOf(s);
  if(idx>-1){ userStars.splice(idx,1); taskCount=Math.max(0,taskCount-1); document.getElementById('cnt').textContent=taskCount; }
}

// ── right-click context menu ──────────────────────────────
const ctxMenu=document.getElementById('ctx-menu');
cv.addEventListener('contextmenu',e=>{
  e.preventDefault();
  const hit=getHitStar(e.clientX,e.clientY);
  if(hit){
    ctxTarget=hit;
    ctxMenu.style.left=e.clientX+'px';
    ctxMenu.style.top=e.clientY+'px';
    ctxMenu.classList.add('show');
  }
});
document.getElementById('ctx-delete').onclick=()=>{
  if(ctxTarget){ deleteStar(ctxTarget); ctxTarget=null; }
  ctxMenu.classList.remove('show');
};
document.addEventListener('click',()=>ctxMenu.classList.remove('show'));

function getHitStar(mx,my){
  for(let i=userStars.length-1;i>=0;i--){
    const s=userStars[i];
    if(Math.hypot(mx-s.x,my-s.y)<Math.max(s.rad*2,16)) return s;
  }
  return null;
}

// ── replay ────────────────────────────────────────────────
const replayBtn=document.getElementById('replay-btn');
replayBtn.addEventListener('click',()=>{
  if(userStars.length===0){showToast('還沒有星星可以回放');return;}
  replayMode=!replayMode;
  replayBtn.classList.toggle('active',replayMode);
  replayBtn.textContent=replayMode?'◼ 停止回放':'▶ 回放今天的路';
  if(replayMode){
    replayIndex=0;
    replayTimer=0;
    userStars.forEach(s=>{s._replayAlpha=s.alpha;s.alpha=0;});
  } else {
    userStars.forEach(s=>{s.alpha=s._replayAlpha||0.88;});
  }
});

// ── burst ─────────────────────────────────────────────────
function burst(x,y,col){
  for(let i=0;i<22;i++){
    const a=r(0,Math.PI*2),spd=r(1.5,6);
    parts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,rad:r(1,2.5),alpha:r(0.6,1),life:1,decay:r(0.016,0.038),col});
  }
}

function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',2000);}
function showMilestone(msg){const el=document.getElementById('milestone');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',2800);}

// ── tooltip ───────────────────────────────────────────────
function updateTooltip(){
  const tip=document.getElementById('tooltip');
  const all=[...userStars,...otherStars.filter(s=>s.label)];
  let found=null;
  for(const s of all){
    if(Math.hypot(mouseX-s.x,mouseY-s.y)<Math.max(s.rad*2.5,18)){found=s;break;}
  }
  if(found&&found.label){
    tip.textContent=found.label;tip.style.opacity='1';
    let tx=mouseX+14,ty=mouseY-10;
    if(tx+130>W)tx=mouseX-140;
    if(ty<10)ty=mouseY+16;
    tip.style.left=tx+'px';tip.style.top=ty+'px';
  } else {tip.style.opacity='0';}
}

cv.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
cv.addEventListener('mouseleave',()=>{mouseX=-999;mouseY=-999;document.getElementById('tooltip').style.opacity='0';});

// ── draw helpers ──────────────────────────────────────────
function dot(x,y,rad,alpha,col){
  if(rad<0.05||alpha<0.01)return;
  cx.save();cx.globalAlpha=alpha;cx.fillStyle=col;
  cx.beginPath();cx.arc(x,y,rad,0,Math.PI*2);cx.fill();cx.restore();
}
function star8(x,y,rad,alpha,col){
  if(rad<0.1||alpha<0.01)return;
  cx.save();cx.globalAlpha=alpha;cx.fillStyle=col;
  cx.beginPath();
  for(let i=0;i<8;i++){
    const oa=(i/8)*Math.PI*2-Math.PI/2,ia=oa+Math.PI/8;
    i===0?cx.moveTo(x+Math.cos(oa)*rad,y+Math.sin(oa)*rad):cx.lineTo(x+Math.cos(oa)*rad,y+Math.sin(oa)*rad);
    cx.lineTo(x+Math.cos(ia)*rad*0.4,y+Math.sin(ia)*rad*0.4);
  }
  cx.closePath();cx.fill();cx.restore();
}
function drawLines(){
  const thresh=Math.min(W,H)*0.3;
  for(let i=0;i<userStars.length;i++){
    for(let j=i+1;j<userStars.length;j++){
      const a=userStars[i],b=userStars[j];
      if(a.cat!==b.cat||a.alpha<0.2||b.alpha<0.2)continue;
      const d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d>thresh)continue;
      const fade=(1-d/thresh)*0.22;
      const [rr,gg,bb]=CATS[a.cat].rgb;
      cx.save();cx.globalAlpha=fade;cx.strokeStyle=`rgb(${rr},${gg},${bb})`;
      cx.lineWidth=0.8;cx.setLineDash([3,9]);
      cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(b.x,b.y);cx.stroke();
      cx.setLineDash([]);cx.restore();
    }
  }
}

// ── main loop ─────────────────────────────────────────────
let lastT=0;
function loop(t){
  const dt=Math.min(t-lastT,50);lastT=t;
  cx.clearRect(0,0,W,H);

  // bg stars
  for(const s of bgStars){
    dot(s.x,s.y,s.rad,Math.max(0,s.base+Math.sin(t*s.spd*0.001+s.off)*0.07),s.col);
  }

  // other stars
  for(const s of otherStars){
    if(s.traveling){
      s.x+=(s.tx-s.x)*0.012;s.y+=(s.ty-s.y)*0.012;
      s.rad+=(s.targetRad-s.rad)*0.04;s.alpha+=(0.65-s.alpha)*0.03;
      if(Math.hypot(s.x-s.tx,s.y-s.ty)<1)s.traveling=false;
    }
    s.ph+=s.pspd;
    // pulse effect
    if(s.pulseTimer>0){
      s.pulseTimer=Math.max(0,s.pulseTimer-dt*0.002);
    }
    const extraR=s.pulseTimer>0?s.rad*(1+s.pulseTimer*1.2):0;
    const oa=s.alpha*(0.85+Math.sin(s.ph)*0.15);
    if(extraR>0){dot(s.x,s.y,s.rad+extraR,oa*s.pulseTimer*0.5,s.col);}
    dot(s.x,s.y,s.rad*2.5,oa*0.12,s.col);
    dot(s.x,s.y,s.rad,oa,s.col);
  }

  drawLines();

  // replay mode
  if(replayMode){
    replayTimer+=dt;
    if(replayTimer>600&&replayIndex<userStars.length){
      const s=userStars[replayIndex];
      s.alpha=0;s.rad=0;
      burst(s.x,s.y,s.col);
      replayIndex++;replayTimer=0;
    }
    if(replayIndex>=userStars.length){
      replayMode=false;replayBtn.classList.remove('active');
      replayBtn.textContent='▶ 回放今天的路';
      userStars.forEach(s=>{s.alpha=s._replayAlpha||0.88;});
    }
  }

  // user stars
  for(const s of userStars){
    applyGravity(s);
    if(s.rad<s.targetRad){s.rad+=(s.targetRad-s.rad)*0.08;s.alpha+=(0.88-s.alpha)*0.07;}
    s.ph+=s.pspd;
    const pa=s.alpha*(0.85+Math.sin(s.ph)*0.15);
    dot(s.x,s.y,s.rad*3,pa*0.07,s.col);
    dot(s.x,s.y,s.rad*1.8,pa*0.12,s.col);
    star8(s.x,s.y,s.rad,pa,s.col);
  }

  // particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.93;p.vy*=0.93;p.life-=p.decay;
    if(p.life<=0.01){parts.splice(i,1);continue;}
    dot(p.x,p.y,p.rad*p.life,p.alpha*p.life,p.col);
  }

  updateTooltip();
  requestAnimationFrame(loop);
}

// ── events ────────────────────────────────────────────────
document.getElementById('btn').onclick=complete;
document.getElementById('task').addEventListener('keydown',e=>{if(e.key==='Enter')complete();});
document.getElementById('undo-btn').onclick=undoLast;
document.getElementById('dl').onclick=()=>{const a=document.createElement('a');a.download='focus-starmap.png';a.href=cv.toDataURL('image/png');a.click();};
document.addEventListener('keydown',e=>{if((e.key==='z'||e.key==='Z')&&(e.metaKey||e.ctrlKey||true))undoLast();});
window.addEventListener('resize',init);

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
